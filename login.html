<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login / Register - E-Commerce</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    
    <style>
        /* Custom Auth Styles */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background-color: #f4f6f8; /* Soft background to match e-commerce feel */
        }
        .auth-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: none;
            overflow: hidden;
        }
        .auth-header {
            background-color: #81c408; /* Primary theme color typical for organic/fruit themes */
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .btn-primary-custom {
            background-color: #81c408;
            border-color: #81c408;
            color: white;
            border-radius: 50px;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .btn-primary-custom:hover {
            background-color: #ffb524; /* Secondary hover color */
            border-color: #ffb524;
            color: white;
        }
        .toggle-form {
            color: #81c408;
            cursor: pointer;
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container-fluid auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8 col-sm-10">
                    <div class="card auth-card">
                        
                        <!-- Login Form -->
                        <div id="login-section">
                            <div class="auth-header">
                                <h3>Welcome Back!</h3>
                                <p class="mb-0">Sign in to continue shopping.</p>
                            </div>
                            <div class="card-body p-4 p-md-5">
                                <form id="login-form">
                                    <div class="mb-3">
                                        <label for="loginEmail" class="form-label">Email address</label>
                                        <input type="email" class="form-control rounded-pill" id="loginEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label">Password</label>
                                        <input type="password" class="form-control rounded-pill" id="loginPassword" required>
                                    </div>
                                    <div class="d-flex justify-content-between mb-4">
                                        <div class="form-check">
                                            <input type="checkbox" class="form-check-input" id="rememberMe">
                                            <label class="form-check-label" for="rememberMe">Remember me</label>
                                        </div>
                                        <a href="#" class="text-muted"><small>Forgot Password?</small></a>
                                    </div>
                                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">Sign In</button>
                                    <div class="text-center text-muted">
                                        Don't have an account? <span class="toggle-form" onclick="toggleAuth('register')">Register here</span>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- Register Form -->
                        <div id="register-section" class="hidden">
                            <div class="auth-header">
                                <h3>Create Account</h3>
                                <p class="mb-0">Join us to start shopping.</p>
                            </div>
                            <div class="card-body p-4 p-md-5">
                                <form id="register-form">
                                    <div class="mb-3">
                                        <label for="registerName" class="form-label">Full Name</label>
                                        <input type="text" class="form-control rounded-pill" id="registerName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="registerEmail" class="form-label">Email address</label>
                                        <input type="email" class="form-control rounded-pill" id="registerEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="registerPassword" class="form-label">Password</label>
                                        <input type="password" class="form-control rounded-pill" id="registerPassword" required minlength="8">
                                    </div>
                                    <div class="mb-4">
                                        <label for="registerConfirmPassword" class="form-label">Confirm Password</label>
                                        <input type="password" class="form-control rounded-pill" id="registerConfirmPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary-custom w-100 mb-3">Register</button>
                                    <div class="text-center text-muted">
                                        Already have an account? <span class="toggle-form" onclick="toggleAuth('login')">Sign In</span>
                                    </div>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript to toggle views -->
    <script src="js/login.js"></script>
</body>
</html>
